<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>【ご案内】シークレット特典窓口</title>
    <style>
        /* 1画面に収めるための設定とダークテーマ */
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            background-color: #121212; /* 高級感のあるダーク背景 */
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            overflow: hidden; /* スクロール禁止 */
        }

        .container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
            padding: 0 24px;
            box-sizing: border-box;
            text-align: center;
        }

        /* 招待制をアピールするゴールドのバッジ */
        .badge {
            background: linear-gradient(135deg, #d4af37, #f3e5ab);
            color: #000;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 16px;
            letter-spacing: 1px;
            box-shadow: 0 4px 10px rgba(212, 175, 55, 0.2);
        }

        h1 {
            font-size: 22px;
            font-weight: bold;
            margin: 0 0 16px 0;
            line-height: 1.4;
            letter-spacing: 0.5px;
        }

        p {
            font-size: 14px;
            color: #cccccc;
            margin: 0 0 32px 0;
            line-height: 1.6;
        }

        .btn-wrapper {
            width: 100%;
            max-width: 320px;
            margin-bottom: 24px;
        }

        /* 押しやすさを重視したLINEボタン */
        .btn {
            display: block;
            width: 100%;
            background-color: #06C755;
            color: #ffffff;
            text-decoration: none;
            font-weight: bold;
            font-size: 16px;
            padding: 16px 0;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(6, 199, 85, 0.2);
            transition: transform 0.2s, opacity 0.2s;
            box-sizing: border-box;
        }

        .btn:active {
            transform: scale(0.97);
            opacity: 0.9;
        }

        .btn span {
            display: block;
            font-size: 11px;
            font-weight: normal;
            margin-top: 4px;
            opacity: 0.9;
        }

        /* 審査通過のための免責事項 */
        .disclaimer {
            font-size: 10px;
            color: #666666;
            line-height: 1.5;
            text-align: center;
            max-width: 320px;
        }

        /* 審査対策用ダミーリンク */
        .footer-links {
            margin-top: 20px;
            font-size: 11px;
        }

        .footer-links a {
            color: #555555;
            text-decoration: none;
            margin: 0 8px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="badge">完全招待制</div>
        
        <h1>視聴者様限定<br>シークレットご案内枠</h1>
        
        <p>
            いつも応援してくださる皆様へ、<br>
            特別なデジタルギフトをご用意しました。<br>
